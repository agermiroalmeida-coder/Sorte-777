<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorte 777 - Betting Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Sorte 777 Betting Platform</h1>
    </header>
    <main>
        <section id="balance">
            <h2>Your Balance</h2>
            <p id="balance-amount">$0.00</p>
        </section>
        <section id="betting-interface">
            <h2>Place Your Bet</h2>
            <input type="number" id="bet-amount" placeholder="Enter your bet amount">
            <button id="place-bet">Place Bet</button>
        </section>
        <section id="reels-display">
            <h2>Reels</h2>
            <div id="reels">
                <div class="reel">0</div>
                <div class="reel">0</div>
                <div class="reel">0</div>
            </div>
            <button id="spin-reels">Spin</button>
        </section>
        <section id="game-history">
            <h2>Game History</h2>
            <ul id="history-list">
                <li>No games played yet.</li>
            </ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Sorte 777. All Rights Reserved.</p>
    </footer>
</body>
</html>
